<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SmartPantry - Alacena Inteligente AI</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            }
          }
        }
      }
    }
  </script>

  <!-- React y Babel para compilación en el navegador -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Web SDK (Compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Fuentes e Iconos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    /* Ocultar barra de scroll en sliders horizontales */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Lienzo con grid punteado para diseño retro */
    .pizarra-grid {
      background-color: #1e293b;
      background-image: radial-gradient(#334155 1.5px, transparent 1.5px);
      background-size: 16px 16px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <div id="root"></div>

  <!-- CÓDIGO REACT COMPILADO CON BABEL -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const apiKey = ""; // La API key de Gemini se autoinyecta en runtime
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'smartpantry-app';

    // Configuración Firebase (Se alimenta de la variable del entorno o fallback local de desarrollo)
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : { apiKey: "mock-key", authDomain: "mock-auth", projectId: "mock-proj", storageBucket: "mock-bucket", messagingSenderId: "mock-msg", appId: "mock-app" };

    // Inicializar Firebase
    let app, auth, db;
    try {
      if (!firebase.apps.length) {
        app = firebase.initializeApp(firebaseConfig);
      } else {
        app = firebase.app();
      }
      auth = firebase.auth();
      db = firebase.firestore();
    } catch (e) {
      console.warn("Firebase no configurado de forma completa. Operando en modo Local/Demo.");
    }

    // --- DATOS INICIALES MOCK PARA DEMOSTRACIÓN ---
    const DEFAULT_PANTRY = [
      { id: 'p1', name: 'Huevos ecológicos', category: 'Lácteos y Huevos', quantity: '12 unidades', addedDate: '2026-06-10', expiryDate: '2026-06-25', daysLeft: 10 },
      { id: 'p2', name: 'Leche Semidesnatada', category: 'Lácteos y Huevos', quantity: '1 Litro', addedDate: '2026-06-12', expiryDate: '2026-06-18', daysLeft: 3 },
      { id: 'p3', name: 'Tomates Cherry', category: 'Verduras y Hortalizas', quantity: '500g', addedDate: '2026-06-14', expiryDate: '2026-06-19', daysLeft: 4 },
      { id: 'p4', name: 'Pechugas de Pollo', category: 'Carnes y Pescados', quantity: '400g', addedDate: '2026-06-14', expiryDate: '2026-06-17', daysLeft: 2 }
    ];

    const DEFAULT_ESSENTIALS = [
      { id: 'e1', name: 'Leche Semidesnatada', category: 'Lácteos y Huevos', minQuantity: '1 Litro' },
      { id: 'e2', name: 'Huevos', category: 'Lácteos y Huevos', minQuantity: '6 unidades' },
      { id: 'e3', name: 'Tomates', category: 'Verduras y Hortalizas', minQuantity: '500g' },
      { id: 'e4', name: 'Aceite de Oliva', category: 'Despensa', minQuantity: '1 Botella' }
    ];

    const SIMULATED_PHOTOS = [
      {
        name: 'Plátanos Maduros',
        imageUrl: 'https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=500&auto=format&fit=crop&q=60',
        mimeType: 'image/jpeg'
      },
      {
        name: 'Yogur Griego',
        imageUrl: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=500&auto=format&fit=crop&q=60',
        mimeType: 'image/jpeg'
      },
      {
        name: 'Manzanas Rojas',
        imageUrl: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=500&auto=format&fit=crop&q=60',
        mimeType: 'image/jpeg'
      },
      {
        name: 'Pan de Centeno',
        imageUrl: 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=500&auto=format&fit=crop&q=60',
        mimeType: 'image/jpeg'
      }
    ];

    const CATEGORIES = ['Todos', 'Frutas', 'Verduras y Hortalizas', 'Lácteos y Huevos', 'Carnes y Pescados', 'Despensa', 'Panadería', 'Bebidas'];

    function App() {
      // Autenticación y Cuentas
      const [user, setUser] = useState(null);
      const [isAuthChecking, setIsAuthChecking] = useState(true);
      const [authMode, setAuthMode] = useState('login'); // login, register, forgot
      const [guestMode, setGuestMode] = useState(false);

      // Campos de Entrada de Autenticación
      const [emailInput, setEmailInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      const [rememberMe, setRememberMe] = useState(false);

      // Gestión de Grupos Familiares
      const [familyId, setFamilyId] = useState('');
      const [tempFamilyId, setTempFamilyId] = useState('');
      const [isFamilyMode, setIsFamilyMode] = useState(false);

      // Navegación
      const [activeTab, setActiveTab] = useState('dashboard'); // dashboard, pantry, scan, pizarra, recipes
      const [pantrySubTab, setPantrySubTab] = useState('stock'); // stock, essentials

      // Listas de Datos de la Alacena
      const [pantry, setPantry] = useState([]);
      const [essentials, setEssentials] = useState([]);
      const [recipes, setRecipes] = useState([]);

      // Controladores de interfaz y carga
      const [toast, setToast] = useState(null);
      const [loadingScan, setLoadingScan] = useState(false);
      const [loadingRecipe, setLoadingRecipe] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [filterCategory, setFilterCategory] = useState('Todos');

      // Modales
      const [showAddPantry, setShowAddPantry] = useState(false);
      const [showAddEssential, setShowAddEssential] = useState(false);
      const [selectedRecipe, setSelectedRecipe] = useState(null);

      // Formularios manuales
      const [manualPantry, setManualPantry] = useState({ name: '', category: 'Verduras y Hortalizas', quantity: '', daysToExpiry: '7' });
      const [manualEssential, setManualEssential] = useState({ name: '', category: 'Verduras y Hortalizas', minQuantity: '' });

      // Escáner e imágenes
      const [scanImage, setScanImage] = useState(null);
      const [scanPreviewUrl, setScanPreviewUrl] = useState(null);
      const [aiResult, setAiResult] = useState(null);

      // --- ESTADOS DE LA PIZARRA DE RECETAS ---
      const [pizarraIngredients, setPizarraIngredients] = useState(() => {
        const saved = localStorage.getItem('sp_pizarra_ingredients');
        return saved ? JSON.parse(saved) : [];
      });
      const [newPizarraItem, setNewPizarraItem] = useState('');
      const [pizarraColor, setPizarraColor] = useState('#10b981'); // Emerald de defecto
      const [pizarraBrushSize, setPizarraBrushSize] = useState(4);
      const [isErasing, setIsErasing] = useState(false);
      const [loadingPizarraRecipe, setLoadingPizarraRecipe] = useState(false);

      const canvasRef = useRef(null);
      const isDrawingRef = useRef(false);

      // Guardar pizarra en LocalStorage
      useEffect(() => {
        localStorage.setItem('sp_pizarra_ingredients', JSON.stringify(pizarraIngredients));
      }, [pizarraIngredients]);

      useEffect(() => {
        if (activeTab === 'pizarra' && canvasRef.current) {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          
          // Ajustar dimensiones del canvas de forma responsiva al contenedor
          const rect = canvas.parentNode.getBoundingClientRect();
          canvas.width = rect.width || 400;
          canvas.height = 250;

          // Fondo oscuro inicial
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
        }
      }, [activeTab]);

      // Toast feedback
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      // Cargar credenciales guardadas si 'Recordar' estuvo activo
      useEffect(() => {
        const savedEmail = localStorage.getItem('sp_saved_email');
        const savedFamily = localStorage.getItem('sp_saved_family');
        if (savedEmail) {
          setEmailInput(savedEmail);
          setRememberMe(true);
        }
        if (savedFamily) {
          setFamilyId(savedFamily);
          setIsFamilyMode(true);
        }

        // Suscribirse al estado de Firebase Auth
        if (auth) {
          const unsubscribe = auth.onAuthStateChanged((firebaseUser) => {
            if (firebaseUser) {
              setUser(firebaseUser);
              setGuestMode(false);
              loadUserData(firebaseUser.uid);
            } else {
              setUser(null);
            }
            setIsAuthChecking(false);
          });
          return () => unsubscribe();
        } else {
          setIsAuthChecking(false);
        }
      }, []);

      const loadUserData = async (uid) => {
        if (!db) {
          loadLocalFallback();
          return;
        }

        try {
          let pantryRef, essentialsRef;
          
          if (isFamilyMode && familyId) {
            pantryRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('families').doc(familyId).collection('pantry');
            essentialsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('families').doc(familyId).collection('essentials');
          } else {
            pantryRef = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('pantry');
            essentialsRef = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('essentials');
          }

          pantryRef.onSnapshot((snapshot) => {
            const items = [];
            snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
            setPantry(items.length > 0 ? items : DEFAULT_PANTRY);
          }, (err) => console.warn("Firestore Despensa err:", err));

          essentialsRef.onSnapshot((snapshot) => {
            const items = [];
            snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
            setEssentials(items.length > 0 ? items : DEFAULT_ESSENTIALS);
          }, (err) => console.warn("Firestore Esenciales err:", err));

        } catch (e) {
          console.error("Error al suscribirse a Firestore: ", e);
          loadLocalFallback();
        }
      };

      const loadLocalFallback = () => {
        const savedPantry = localStorage.getItem('sp_local_pantry');
        const savedEssentials = localStorage.getItem('sp_local_essentials');
        setPantry(savedPantry ? JSON.parse(savedPantry) : DEFAULT_PANTRY);
        setEssentials(savedEssentials ? JSON.parse(savedEssentials) : DEFAULT_ESSENTIALS);
      };

      // Guardar localmente si operamos en modo Invitado
      useEffect(() => {
        if (guestMode || !auth) {
          localStorage.setItem('sp_local_pantry', JSON.stringify(pantry));
          localStorage.setItem('sp_local_essentials', JSON.stringify(essentials));
        }
      }, [pantry, essentials, guestMode]);

      // --- EXPONENTIAL BACKOFF FOR GEMINI API CALLS ---
      const callGemini = async (payload) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        let delay = 1000;
        for (let i = 0; i < 5; i++) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (response.ok) return await response.json();
            if (response.status === 429 || response.status >= 500) {
              await new Promise(res => setTimeout(res, delay));
              delay *= 2;
            } else {
              const err = await response.text();
              throw new Error(`Error ${response.status}: ${err}`);
            }
          } catch (error) {
            if (i === 4) throw error;
            await new Promise(res => setTimeout(res, delay));
            delay *= 2;
          }
        }
      };

      // --- SISTEMA DE AUTENTICACIÓN ---
      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        if (!auth) {
          showToast("Firebase no inicializado correctamente.", "error");
          return;
        }

        try {
          if (authMode === 'login') {
            await auth.signInWithEmailAndPassword(emailInput, passwordInput);
            if (rememberMe) {
              localStorage.setItem('sp_saved_email', emailInput);
            } else {
              localStorage.removeItem('sp_saved_email');
            }
            showToast("¡Inicio de sesión correcto!", "success");
          } else if (authMode === 'register') {
            await auth.createUserWithEmailAndPassword(emailInput, passwordInput);
            showToast("¡Usuario registrado con éxito!", "success");
          }
        } catch (error) {
          showToast(error.message, "error");
        }
      };

      const handleForgotPassword = async (e) => {
        e.preventDefault();
        if (!emailInput) {
          showToast("Por favor, introduce tu correo electrónico.", "warning");
          return;
        }
        try {
          await auth.sendPasswordResetEmail(emailInput);
          showToast("Correo de restablecimiento enviado. Revisa tu bandeja.", "info");
          setAuthMode('login');
        } catch (error) {
          showToast(error.message, "error");
        }
      };

      const handleLogout = () => {
        if (auth) auth.signOut();
        setUser(null);
        setGuestMode(false);
        showToast("Sesión cerrada.", "info");
      };

      const handleGuestAccess = () => {
        setGuestMode(true);
        loadLocalFallback();
        showToast("Accediendo como Invitado (Modo Local).", "info");
      };

      // --- CONFIGURACIÓN DE GRUPOS FAMILIARES ---
      const createFamilyGroup = () => {
        const newCode = `SP-${Math.floor(100000 + Math.random() * 900000)}`;
        setFamilyId(newCode);
        setIsFamilyMode(true);
        if (rememberMe) {
          localStorage.setItem('sp_saved_family', newCode);
        }
        showToast(`¡Grupo creado! Comparte el código: ${newCode}`, "success");
        if (user) loadUserData(user.uid);
      };

      const joinFamilyGroup = (e) => {
        e.preventDefault();
        if (!tempFamilyId.trim()) return;
        setFamilyId(tempFamilyId.toUpperCase());
        setIsFamilyMode(true);
        if (rememberMe) {
          localStorage.setItem('sp_saved_family', tempFamilyId.toUpperCase());
        }
        showToast(`Unido al grupo familiar ${tempFamilyId.toUpperCase()}`, "success");
        setTempFamilyId('');
        if (user) loadUserData(user.uid);
      };

      const leaveFamilyGroup = () => {
        setFamilyId('');
        setIsFamilyMode(false);
        localStorage.removeItem('sp_saved_family');
        showToast("Has salido del grupo familiar.", "info");
        if (user) loadUserData(user.uid);
      };

      // --- ESCÁNER DE IMÁGENES CON GEMINI AI ---
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setScanImage({
              base64: reader.result.split(',')[1],
              mimeType: file.type
            });
            setScanPreviewUrl(reader.result);
            setAiResult(null);
          };
          reader.readAsDataURL(file);
        }
      };

      const loadSimulatedFood = async (food) => {
        try {
          setLoadingScan(true);
          setScanPreviewUrl(food.imageUrl);
          setAiResult(null);

          const response = await fetch(food.imageUrl);
          const blob = await response.blob();
          const reader = new FileReader();
          reader.onloadend = () => {
            setScanImage({
              base64: reader.result.split(',')[1],
              mimeType: 'image/jpeg'
            });
            setLoadingScan(false);
            showToast(`"${food.name}" seleccionado. Listo para análisis.`, 'info');
          };
          reader.readAsDataURL(blob);
        } catch (e) {
          setLoadingScan(false);
          showToast("Error cargando simulación.", "error");
        }
      };

      const analyzeWithGemini = async () => {
        if (!scanImage) {
          showToast("Por favor, toma una foto o selecciona una demo.", "warning");
          return;
        }

        setLoadingScan(true);
        setAiResult(null);

        const prompt = `Eres un chef inteligente y experto en despensas. Analiza la imagen de este ingrediente y responde obligatoriamente en formato JSON crudo (sin formatear como bloque de markdown) con esta estructura exacta:
        {
          "name": "Nombre exacto del alimento en español",
          "category": "Una de estas categorías exactas: 'Frutas', 'Verduras y Hortalizas', 'Lácteos y Huevos', 'Carnes y Pescados', 'Despensa', 'Panadería', 'Bebidas'",
          "quantity": "Cantidad aproximada detectada",
          "estimatedDaysToExpiry": "Número entero de días sugerido antes de caducar",
          "nutritionalAdvice": "Consejo saludable rápido de un renglón"
        }`;

        const payload = {
          contents: [{
            parts: [
              { text: prompt },
              { inlineData: { mimeType: scanImage.mimeType, data: scanImage.base64 } }
            ]
          }],
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const result = await callGemini(payload);
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            const parsed = JSON.parse(text.trim().replace(/^```json\s*/, '').replace(/```$/, ''));
            setAiResult(parsed);
            showToast("¡Análisis de la IA finalizado!", "success");
          }
        } catch (e) {
          console.error(e);
          showToast("La IA no ha podido identificar la foto. Intenta con otra.", "error");
        } finally {
          setLoadingScan(false);
        }
      };

      const getCoordinates = (event) => {
        const canvas = canvasRef.current;
        if (!canvas) return { x: 0, y: 0 };
        const rect = canvas.getBoundingClientRect();
        
        if (event.touches && event.touches.length > 0) {
          return {
            x: event.touches[0].clientX - rect.left,
            y: event.touches[0].clientY - rect.top
          };
        }
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      };

      const startDrawing = (e) => {
        isDrawingRef.current = true;
        const coords = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
      };

      const draw = (e) => {
        if (!isDrawingRef.current) return;
        e.preventDefault(); // Evitar scroll táctil mientras dibujamos en iPad/Móvil
        const coords = getCoordinates(e);
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        
        ctx.lineWidth = pizarraBrushSize;
        ctx.strokeStyle = isErasing ? '#1e293b' : pizarraColor; // Eraser uses the grid background color
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
      };

      const stopDrawing = () => {
        isDrawingRef.current = false;
      };

      const clearPizarraCanvas = () => {
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          showToast("Lienzo de la pizarra borrado.", "info");
        }
      };

      const addPizarraIngredient = (e) => {
        e.preventDefault();
        if (!newPizarraItem.trim()) return;
        setPizarraIngredients([...pizarraIngredients, newPizarraItem.trim()]);
        setNewPizarraItem('');
      };

      const removePizarraIngredient = (index) => {
        setPizarraIngredients(pizarraIngredients.filter((_, i) => i !== index));
      };

      const generateRecipeFromPizarra = async () => {
        setLoadingPizarraRecipe(true);
        setSelectedRecipe(null);

        try {
          const canvas = canvasRef.current;
          // Obtener base64 de la pizarra gráfica
          const base64Canvas = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
          const typedIngredients = pizarraIngredients.join(', ');

          const prompt = `Eres un chef creativo de estrella michelin. Analiza mi pizarra de ideas. En ella he dibujado un boceto o tomado anotaciones sobre mi próximo plato y he listado los siguientes ingredientes borrador adicionales: "${typedIngredients}".
          Por favor, interpreta el dibujo, detecta si hay textos manuscritos o esquemas y genera una receta asombrosa que se ajuste a mis ideas gráficas y textuales de la pizarra.
          Responde estrictamente en este formato JSON puro sin formato markdown:
          {
            "title": "Nombre de la Receta Creativa de la Pizarra",
            "prepTime": "Tiempo estimado de preparación",
            "difficulty": "Fácil / Media / Avanzada",
            "healthHighlight": "Beneficio saludable principal",
            "ingredientsUsed": ["ingrediente usado 1", "ingrediente 2"],
            "ingredientsMissing": ["ingrediente opcional para mejorar"],
            "instructions": ["Paso 1 del boceto...", "Paso 2..."],
            "calories": "ej. 420 kcal"
          }`;

          const payload = {
            contents: [{
              parts: [
                { text: prompt },
                { inlineData: { mimeType: 'image/jpeg', data: base64Canvas } }
              ]
            }],
            generationConfig: { responseMimeType: "application/json" }
          };

          const result = await callGemini(payload);
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            const parsed = JSON.parse(text.trim().replace(/^```json\s*/, '').replace(/```$/, ''));
            setSelectedRecipe(parsed);
            showToast("¡Receta generada con éxito de tus trazos!", "success");
          }
        } catch (e) {
          console.error(e);
          showToast("Error analizando los trazos de la pizarra. Asegúrate de añadir ingredientes.", "error");
        } finally {
          setLoadingPizarraRecipe(false);
        }
      };

      const saveAiToPantry = async () => {
        if (!aiResult) return;
        const today = new Date();
        const expiry = new Date();
        const days = parseInt(aiResult.estimatedDaysToExpiry) || 7;
        expiry.setDate(today.getDate() + days);

        const newItem = {
          name: aiResult.name,
          category: aiResult.category,
          quantity: aiResult.quantity || '1 unidad',
          addedDate: today.toISOString().split('T')[0],
          expiryDate: expiry.toISOString().split('T')[0],
          daysLeft: days
        };

        if (db && user) {
          let ref = isFamilyMode && familyId
            ? db.collection('artifacts').doc(appId).collection('public').doc('data').collection('families').doc(familyId).collection('pantry')
            : db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('pantry');
          
          await ref.add(newItem);
        } else {
          setPantry(prev => [{ id: 'local-' + Date.now(), ...newItem }, ...prev]);
        }

        showToast(`"${newItem.name}" agregado.`, "success");
        setScanPreviewUrl(null);
        setScanImage(null);
        setAiResult(null);
        setActiveTab('pantry');
      };

      // --- CREACIÓN DE RECETAS SALUDABLES CON GEMINI AI ---
      const generateRecipes = async () => {
        if (pantry.length === 0) {
          showToast("Debes añadir alimentos a tu despensa antes.", "warning");
          return;
        }

        setLoadingRecipe(true);
        setRecipes([]);

        const listText = pantry.map(p => `${p.name} (${p.quantity})`).join(', ');
        const prompt = `Actúa como chef saludable de estrella michelin. Tengo estos ingredientes en mi despensa: ${listText}. Recomienda 3 recetas ricas, sumamente nutritivas y originales que aprovechen estos ingredientes al máximo. Responde en formato JSON crudo (sin formato de markdown) con esta estructura exacta:
        {
          "recipes": [
            {
              "title": "Nombre de la receta",
              "prepTime": "ej. 25 min",
              "difficulty": "Fácil / Media / Avanzada",
              "healthHighlight": "Beneficio de la receta",
              "ingredientsUsed": ["ingrediente 1", "ingrediente 2"],
              "ingredientsMissing": ["ingrediente extra opcional"],
              "instructions": ["Paso 1...", "Paso 2..."],
              "calories": "ej. 350 kcal"
            }
          ]
        }`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const result = await callGemini(payload);
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            const parsed = JSON.parse(text.trim().replace(/^```json\s*/, '').replace(/```$/, ''));
            setRecipes(parsed.recipes || []);
            showToast("¡Recetas generadas con éxito!", "success");
          }
        } catch (e) {
          console.error(e);
          showToast("Error al procesar la recomendación.", "error");
        } finally {
          setLoadingRecipe(false);
        }
      };

      // --- OPERACIONES MANUALES ---
      const handleAddManualPantry = async (e) => {
        e.preventDefault();
        if (!manualPantry.name.trim()) return;

        const today = new Date();
        const expiry = new Date();
        const days = parseInt(manualPantry.daysToExpiry) || 7;
        expiry.setDate(today.getDate() + days);

        const newItem = {
          name: manualPantry.name,
          category: manualPantry.category,
          quantity: manualPantry.quantity || '1 unidad',
          addedDate: today.toISOString().split('T')[0],
          expiryDate: expiry.toISOString().split('T')[0],
          daysLeft: days
        };

        if (db && user) {
          let ref = isFamilyMode && familyId
            ? db.collection('artifacts').doc(appId).collection('public').doc('data').collection('families').doc(familyId).collection('pantry')

                  </div>
                </div>

                <div className="space-y-1">
                  <h4 className="font-bold text-xs text-slate-700">Paso a paso:</h4>
                  <ol className="list-decimal pl-4 text-xs text-slate-600 space-y-1">
                    {selectedRecipe.instructions && selectedRecipe.instructions.map((step, i) => (
                      <li key={i}>{step}</li>
                    ))}
                  </ol>
                </div>

                <button
                  onClick={() => setSelectedRecipe(null)}
                  className="w-full bg-slate-100 py-2 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-200 transition"
                >
                  Cerrar Receta
                </button>
              </div>
            </div>
          )}

          {/* --- MODALES FORMULARIOS MANUALES --- */}
          {showAddPantry && (
            <div className="fixed inset-0 bg-slate-900 bg-opacity-60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl max-w-md w-full p-6 space-y-4 shadow-xl">
                <div className="flex justify-between items-center">
                  <h3 className="font-bold text-slate-800 text-sm">➕ Añadir a Despensa</h3>
                  <button onClick={() => setShowAddPantry(false)} className="text-slate-400 text-lg">✕</button>
                </div>
                <form onSubmit={handleAddManualPantry} className="space-y-3">
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-0.5">Nombre del alimento</label>
                    <input
                      type="text" required placeholder="Ej: Arroz Integral"
                      value={manualPantry.name}
                      onChange={(e) => setManualPantry({...manualPantry, name: e.target.value})}
                      className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500"
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-0.5">Categoría</label>
                      <select
                        value={manualPantry.category}
                        onChange={(e) => setManualPantry({...manualPantry, category: e.target.value})}
                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500"
                      >
                        {CATEGORIES.filter(c => c !== 'Todos').map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-0.5">Cantidad</label>
                      <input
                        type="text" placeholder="Ej: 500g, 1 botella"
                        value={manualPantry.quantity}
                        onChange={(e) => setManualPantry({...manualPantry, quantity: e.target.value})}
                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500"
                      />
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-0.5">Días aproximados de caducidad</label>
                    <input
                      type="number" min="1" required placeholder="Ej: 7"
                      value={manualPantry.daysToExpiry}
                      onChange={(e) => setManualPantry({...manualPantry, daysToExpiry: e.target.value})}
                      className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500"
                    />
                  </div>
                  <button type="submit" className="w-full bg-emerald-600 py-2.5 rounded-xl text-xs text-white font-bold">Añadir Alimento</button>
                </form>
              </div>
            </div>
          )}

          {showAddEssential && (
            <div className="fixed inset-0 bg-slate-900 bg-opacity-60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl max-w-md w-full p-6 space-y-4 shadow-xl">
                <div className="flex justify-between items-center">
                  <h3 className="font-bold text-slate-800 text-sm">📋 Añadir Imprescindible</h3>
                  <button onClick={() => setShowAddEssential(false)} className="text-slate-400 text-lg">✕</button>
                </div>
                <form onSubmit={handleAddManualEssential} className="space-y-3">
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-0.5">Nombre del Imprescindible</label>
                    <input
                      type="text" required placeholder="Ej: Huevos"
                      value={manualEssential.name}
                      onChange={(e) => setManualEssential({...manualEssential, name: e.target.value})}
                      className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500"
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-0.5">Categoría</label>
                      <select
                        value={manualEssential.category}
                        onChange={(e) => setManualEssential({...manualEssential, category: e.target.value})}
                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500"
                      >
                        {CATEGORIES.filter(c => c !== 'Todos').map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-0.5">Cantidad mínima</label>
                      <input
                        type="text" placeholder="Ej: 6 unidades"
                        value={manualEssential.minQuantity}
                        onChange={(e) => setManualEssential({...manualEssential, minQuantity: e.target.value})}
                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500"
                      />
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-emerald-600 py-2.5 rounded-xl text-xs text-white font-bold">Añadir Imprescindible</button>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
